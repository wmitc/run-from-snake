<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run From Snake</title>
<style>
  :root {
    --bg: #0b0e14;
    --grid-line: #151a24;
    --text: #d8e0f0;
    --accent: #39ff88;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #hud {
    display: flex;
    gap: 32px;
    font-size: 18px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    user-select: none;
  }
  #hud .value { color: var(--accent); font-weight: 700; }
  canvas {
    background: var(--bg);
    border: 1px solid #1d2433;
    border-radius: 6px;
    max-width: min(92vw, 92vh);
    max-height: min(92vw, 92vh);
  }
  #hint {
    font-size: 13px;
    color: #5c6780;
    user-select: none;
  }
</style>
</head>
<body>
  <div id="hud">
    <div>Score <span class="value" id="score">0</span></div>
    <div>Best <span class="value" id="best">0</span></div>
  </div>
  <canvas id="game" width="720" height="720"></canvas>
  <div id="hint">WASD / arrows to move — you are the apple. Run.</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Config — all tuning knobs live here
// ---------------------------------------------------------------------------
const CONFIG = {
  gridSize: 24,          // cells per side
  cellPx: 30,            // canvas pixels per cell
  logicHz: 60,           // fixed logic updates per second
  playerStepMs: 110,     // ms per grid step while a direction is held
};

// ---------------------------------------------------------------------------
// Canvas setup
// ---------------------------------------------------------------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = CONFIG.gridSize * CONFIG.cellPx;
canvas.height = CONFIG.gridSize * CONFIG.cellPx;

const hud = {
  score: document.getElementById("score"),
  best: document.getElementById("best"),
};

// ---------------------------------------------------------------------------
// Game state machine
// ---------------------------------------------------------------------------
const State = { TITLE: "title", PLAYING: "playing", DEAD: "dead" };

const game = {
  state: State.TITLE,
  score: 0,
  best: 0,
  time: 0, // seconds of game time elapsed this run
};

// ---------------------------------------------------------------------------
// Directions & input — most recently pressed held key wins; releasing it
// falls back to the next most recent still-held key (instant turns).
// ---------------------------------------------------------------------------
const DIRS = {
  up:    { x: 0, y: -1 },
  down:  { x: 0, y: 1 },
  left:  { x: -1, y: 0 },
  right: { x: 1, y: 0 },
};

const KEYMAP = {
  ArrowUp: "up", KeyW: "up",
  ArrowDown: "down", KeyS: "down",
  ArrowLeft: "left", KeyA: "left",
  ArrowRight: "right", KeyD: "right",
};

const heldDirs = []; // stack of direction names, newest last

function currentDir() {
  return heldDirs.length ? DIRS[heldDirs[heldDirs.length - 1]] : null;
}

// ---------------------------------------------------------------------------
// Player — a small critter on the grid; steps while a direction is held
// ---------------------------------------------------------------------------
const player = {
  x: 0, y: 0,           // current grid cell
  px: 0, py: 0,         // previous cell, for render interpolation
  stepTimer: 0,         // ms since last step
  moving: false,
};

function resetPlayer() {
  player.x = Math.floor(CONFIG.gridSize / 2);
  player.y = Math.floor(CONFIG.gridSize / 2);
  player.px = player.x;
  player.py = player.y;
  player.stepTimer = 0;
  player.moving = false;
}

function updatePlayer(dtMs) {
  const dir = currentDir();
  player.stepTimer += dtMs;
  if (player.stepTimer < CONFIG.playerStepMs) return;

  if (!dir) {
    player.moving = false;
    player.px = player.x;
    player.py = player.y;
    player.stepTimer = CONFIG.playerStepMs; // step instantly when input resumes
    return;
  }

  const nx = player.x + dir.x;
  const ny = player.y + dir.y;
  player.px = player.x;
  player.py = player.y;
  if (inBounds(nx, ny)) {
    player.x = nx;
    player.y = ny;
    player.moving = true;
  } else {
    player.moving = false; // walls: stay put, keep facing
  }
  player.stepTimer = 0;
}

function inBounds(x, y) {
  return x >= 0 && x < CONFIG.gridSize && y >= 0 && y < CONFIG.gridSize;
}

function resetRun() {
  game.score = 0;
  game.time = 0;
  resetPlayer();
  game.state = State.PLAYING;
}

// ---------------------------------------------------------------------------
// Fixed-timestep game loop
// ---------------------------------------------------------------------------
const STEP = 1 / CONFIG.logicHz;
let lastTime = performance.now();
let accumulator = 0;

function frame(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 0.25); // clamp huge tab-switch deltas

  accumulator += dt;
  while (accumulator >= STEP) {
    update(STEP);
    accumulator -= STEP;
  }
  render();
  requestAnimationFrame(frame);
}

function update(dt) {
  if (game.state !== State.PLAYING) return;
  game.time += dt;
  updatePlayer(dt * 1000);
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function render() {
  const css = getComputedStyle(document.documentElement);
  ctx.fillStyle = css.getPropertyValue("--bg");
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();

  if (game.state === State.TITLE) {
    drawTitle();
  } else {
    drawPlayer();
  }
}

// Interpolated pixel-center of an entity between its previous and current cell
function lerpCenter(e) {
  const t = Math.min(e.stepTimer / CONFIG.playerStepMs, 1);
  const gx = e.px + (e.x - e.px) * t;
  const gy = e.py + (e.y - e.py) * t;
  return {
    x: (gx + 0.5) * CONFIG.cellPx,
    y: (gy + 0.5) * CONFIG.cellPx,
  };
}

function drawPlayer() {
  const { x, y } = lerpCenter(player);
  const r = CONFIG.cellPx * 0.38;

  ctx.save();
  ctx.fillStyle = "#ffd23f";
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Eyes sit perpendicular to the heading and look along it
  const dir = currentDir() || DIRS.right;
  const eyeOffset = r * 0.42;
  const lookX = dir.x * r * 0.22;
  const lookY = dir.y * r * 0.22;
  ctx.fillStyle = "#14171f";
  const perp = { x: -dir.y, y: dir.x };
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.arc(x + perp.x * side * eyeOffset + lookX, y + perp.y * side * eyeOffset + lookY, r * 0.18, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGrid() {
  const { gridSize, cellPx } = CONFIG;
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid-line");
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 1; i < gridSize; i++) {
    const p = i * cellPx + 0.5;
    ctx.moveTo(p, 0);
    ctx.lineTo(p, canvas.height);
    ctx.moveTo(0, p);
    ctx.lineTo(canvas.width, p);
  }
  ctx.stroke();
}

function drawTitle() {
  ctx.save();
  ctx.textAlign = "center";
  ctx.fillStyle = "#d8e0f0";
  ctx.font = "700 42px 'Segoe UI', system-ui, sans-serif";
  ctx.fillText("RUN FROM SNAKE", canvas.width / 2, canvas.height / 2 - 20);
  ctx.font = "18px 'Segoe UI', system-ui, sans-serif";
  ctx.fillStyle = "#5c6780";
  ctx.fillText("press any key to start", canvas.width / 2, canvas.height / 2 + 24);
  ctx.restore();
}

// ---------------------------------------------------------------------------
// Input — held-direction tracking + starting the run from the title screen
// ---------------------------------------------------------------------------
window.addEventListener("keydown", (e) => {
  const dir = KEYMAP[e.code];
  if (dir) {
    e.preventDefault();
    if (!heldDirs.includes(dir)) heldDirs.push(dir);
  }
  if (game.state === State.TITLE) resetRun();
});

window.addEventListener("keyup", (e) => {
  const dir = KEYMAP[e.code];
  if (!dir) return;
  const i = heldDirs.indexOf(dir);
  if (i !== -1) heldDirs.splice(i, 1);
});

// Dropped keyups (e.g. alt-tab mid-hold) would leave the critter running
window.addEventListener("blur", () => { heldDirs.length = 0; });

requestAnimationFrame(frame);
</script>
</body>
</html>
